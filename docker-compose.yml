version: '3.8'

services:
  # 博客应用服务
  blog:
    image: iridescent-blog:latest
    container_name: iridescent-blog
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - APIHZ_IP_ID=${APIHZ_IP_ID}
      - APIHZ_IP_KEY=${APIHZ_IP_KEY}
    volumes:
      - ./content:/app/content
    restart: unless-stopped
    networks:
      - blog-network

  # Nginx 反向代理服务
  nginx:
    image: nginx:alpine
    container_name: iridescent-blog-nginx
    ports:
      - "8080:80"  # 使用 8080 端口避免与 procurement-manager 冲突
      - "8443:443"  # HTTPS 使用 8443 端口
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - blog
    restart: unless-stopped
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

